name: LG Twins Ticket Alarm Cron

on:
  schedule:
    # 매일 한국 시간 오전 9시 (UTC 00:00) - GitHub Actions 지연 감안
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 지원

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Alarm API
        run: |
          curl -X GET "https://lgtwins-ticket-alarm.vercel.app/api/cron" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

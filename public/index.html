<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LG 트윈스 티켓 오픈 알리미</title>
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --lg-red: #C8102E; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    min-height: 100vh;
    color: #1a1a1a;
  }

  .top-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 20px;
    border-bottom: 3px solid #1a1a1a;
  }
  .lg-badge {
    background: var(--lg-red); color: #fff;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px; padding: 4px 10px;
    border-radius: 4px; letter-spacing: -1px;
  }
  .top-bar h1 { font-size: 15px; font-weight: 700; }
  .top-bar p { font-size: 11px; color: #999; margin-left: auto; }

  .game-row {
    display: flex; align-items: center;
    padding: 20px; gap: 16px;
    border-bottom: 1px solid #eee;
  }
  .game-row.past {
    opacity: 0.35;
  }

  .date-col {
    flex-shrink: 0; min-width: 80px;
  }
  .date-num {
    font-size: 32px; font-weight: 300; letter-spacing: -1px; line-height: 1;
  }
  .date-sub {
    font-size: 12px; color: #888; margin-top: 2px;
  }

  .teams-col {
    flex: 1; min-width: 0;
  }
  .teams-vs {
    font-size: 14px; font-weight: 500;
  }
  .teams-vs .vs { color: #ccc; margin: 0 6px; font-weight: 400; }
  .teams-venue {
    font-size: 12px; color: #aaa; margin-top: 2px;
  }

  .action-col {
    flex-shrink: 0; text-align: center;
  }
  .btn-buy {
    display: inline-block;
    background: var(--lg-red); color: #fff;
    font-size: 14px; font-weight: 500;
    padding: 10px 24px; border-radius: 6px;
    text-decoration: none; white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-buy:hover { opacity: 0.85; }
  .open-schedule {
    font-size: 13px; color: #555;
    padding: 10px 16px;
    border: 1px solid #ddd; border-radius: 6px;
    white-space: nowrap; line-height: 1.4;
    text-align: center;
  }
  .open-schedule .date { font-weight: 500; }
  .past-label {
    font-size: 13px; color: #bbb;
  }

  .info-bar {
    display: flex; gap: 16px; padding: 12px 20px;
    background: #fafafa; border-bottom: 1px solid #eee;
    font-size: 12px; color: #888;
  }
  .info-bar span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.red { background: var(--lg-red); }
  .dot.green { background: #1a7a3c; }
  .dot.gray { background: #ccc; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="lg-badge">LG</div>
  <h1>TWINS 홈경기 티켓 알리미</h1>
  <p>2026 시즌</p>
</div>

<div class="info-bar">
  <span><i class="dot red"></i> 예매 오픈 전</span>
  <span><i class="dot green"></i> 예매 중</span>
  <span><i class="dot gray"></i> 경기 종료</span>
</div>

<div id="gamesList"><div style="padding:40px;text-align:center;color:#999">일정을 불러오는 중...</div></div>

<script>
function getStatus(g, now) {
  if (now > new Date(g.date + 'T23:59:59').getTime()) return 'past';
  if (now >= new Date(g.openDate).getTime()) return 'on-sale';
  return 'upcoming';
}

function fmtOpenDate(g) {
  const d = new Date(g.openDate);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const dows = ['일','월','화','수','목','금','토'];
  const dow = dows[d.getDay()];
  return `${d.getFullYear()}.${mm}.${dd}(${dow})<br>11:00 오픈예정`;
}

function render(games) {
  const list = document.getElementById('gamesList');
  list.innerHTML = '';
  const now = Date.now();

  games.forEach(g => {
    const status = getStatus(g, now);
    const mm = g.date.substring(5, 7);
    const dd = g.date.substring(8, 10);

    let actionHtml = '';
    if (status === 'on-sale') {
      actionHtml = `<a class="btn-buy" href="https://www.ticketlink.co.kr/sports/137/59" target="_blank">예매하기</a>`;
    } else if (status === 'upcoming') {
      actionHtml = `<div class="open-schedule">${fmtOpenDate(g)}</div>`;
    } else {
      actionHtml = `<span class="past-label">경기 종료</span>`;
    }

    const row = document.createElement('div');
    row.className = 'game-row' + (status === 'past' ? ' past' : '');
    row.innerHTML = `
      <div class="date-col">
        <div class="date-num">${mm}.${dd}</div>
        <div class="date-sub">(${g.dow}) ${g.time}</div>
      </div>
      <div class="teams-col">
        <div class="teams-vs">${g.away}<span class="vs">vs</span>LG 트윈스</div>
        <div class="teams-venue">잠실야구장</div>
      </div>
      <div class="action-col">${actionHtml}</div>
    `;
    list.appendChild(row);
  });
}

fetch('/api/games')
  .then(r => r.json())
  .then(games => render(games))
  .catch(() => {
    document.getElementById('gamesList').innerHTML =
      '<div style="padding:40px;text-align:center;color:#c00">일정을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.</div>';
  });
</script>
</body>
</html>

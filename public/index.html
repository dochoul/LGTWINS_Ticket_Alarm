  .open-schedule {

  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

function getStatus(g, now) {
  if (now > new Date(g.date + 'T23:59:59').getTime()) return 'past';
  if (now >= new Date(g.openDate).getTime()) return 'on-sale';
  return 'upcoming';
}

function fmtOpenDate(g) {
  const d = new Date(g.openDate);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const dows = ['일','월','화','수','목','금','토'];
  const dow = dows[d.getDay()];
  return `${d.getFullYear()}.${mm}.${dd}(${dow})<br>11:00 오픈예정`;
}

  const list = document.getElementById('gamesList');
  list.innerHTML = '';
  const now = Date.now();

  games.forEach(g => {
    const status = getStatus(g, now);
    const mm = g.date.substring(5, 7);
    const dd = g.date.substring(8, 10);

    let actionHtml = '';
    if (status === 'on-sale') {
      actionHtml = `<a class="btn-buy" href="https://www.ticketlink.co.kr/sports/137/59" target="_blank">예매하기</a>`;
    } else if (status === 'upcoming') {
      actionHtml = `<div class="open-schedule">${fmtOpenDate(g)}</div>`;
    } else {
      actionHtml = `<span class="past-label">경기 종료</span>`;
    }

    const row = document.createElement('div');
    row.className = 'game-row' + (status === 'past' ? ' past' : '');
    row.innerHTML = `
      <div class="date-col">
        <div class="date-num">${mm}.${dd}</div>
        <div class="date-sub">(${g.dow}) ${g.time}</div>
      </div>
      <div class="teams-col">
        <div class="teams-vs">${g.away}<span class="vs">vs</span>LG 트윈스</div>
        <div class="teams-venue">잠실야구장</div>
      </div>
      <div class="action-col">${actionHtml}</div>
    `;
    list.appendChild(row);
  });
}

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --lg-red: #C8102E;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    padding: 24px 16px;
    color: #1a1a1a;
  }
  .container { max-width: 480px; margin: 0 auto; }

  .header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .lg-badge {
    background: var(--lg-red); color: #fff;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 24px; padding: 6px 14px;
    border-radius: 6px; letter-spacing: -1px;
  }
  .header-text h1 { font-size: 17px; font-weight: 700; line-height: 1.2; }
  .header-text p { font-size: 12px; color: #666; margin-top: 2px; }

  .games-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .game-card {
    background: #fff;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid #e8e8e8;
  }
  .card-top { display: flex; align-items: stretch; }
  .date-block {
    background: var(--lg-red); color: #fff;
    padding: 14px 16px; min-width: 72px;
    text-align: center; flex-shrink: 0;
    display: flex; flex-direction: column; justify-content: center;
  }
  .date-block .day { font-size: 24px; font-weight: 700; line-height: 1; }
  .date-block .dow { font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .date-block .time { font-size: 11px; opacity: 0.85; margin-top: 1px; }
  .match-info { flex: 1; padding: 12px 14px; }
  .teams { font-size: 14px; font-weight: 500; }
  .venue { font-size: 12px; color: #888; margin-top: 2px; }
  .open-info { padding: 12px 14px; border-left: 1px solid #f0f0f0; text-align: right; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; }
  .open-label { font-size: 10px; color: #999; }
  .open-date { font-size: 13px; font-weight: 500; margin-top: 2px; }

  .countdown-bar {
    border-top: 1px solid #f0f0f0;
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .countdown-label { font-size: 11px; color: #999; }
  .countdown-time { font-size: 15px; font-weight: 700; color: var(--lg-red); letter-spacing: 0.5px; }
  .countdown-time.open { color: #1a7a3c; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .countdown-time.soon { animation: pulse 1s infinite; }

  .alarm-btn {
    font-size: 12px; font-weight: 500;
    background: var(--lg-red); color: #fff;
    border: none; padding: 6px 14px;
    border-radius: 20px; cursor: pointer;
    white-space: nowrap; transition: opacity 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .alarm-btn:hover { opacity: 0.85; }
  .alarm-btn.set {
    background: #f0f0f0; color: #888;
    border: 1px solid #ddd;
  }

  .section {
    background: #fff; border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
    border: 1px solid #e8e8e8;
  }
  .section h2 { font-size: 14px; font-weight: 500; margin-bottom: 14px; }

  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab {
    font-size: 12px; padding: 5px 14px;
    border-radius: 20px; cursor: pointer;
    border: 1px solid #ddd; background: transparent;
    color: #888; font-family: 'Noto Sans KR', sans-serif;

  }
  .tab.active { background: var(--lg-red); color: #fff; border-color: var(--lg-red); }

  .tab-content { display: none; }

  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  .field input {
    width: 100%; padding: 9px 12px;
    border: 1px solid #ddd; border-radius: var(--radius-sm);
    font-size: 14px; font-family: 'Noto Sans KR', sans-serif;

  .field-hint { font-size: 11px; color: #999; margin-top: 3px; }
  .field-hint.ok { color: #1a7a3c; }
  .field-hint.err { color: #a32d2d; }

  .btn-row { display: flex; gap: 8px; margin-top: 14px; }
  .btn-primary {

    background: var(--lg-red); color: #fff;

  .notif-status.ok { color: #1a6e35; }
  .notif-status.err { color: #a32d2d; }

function fmtCountdown(ms) {
  if (ms <= 0) return '판매 중!';
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (d > 0) return d + '일 ' + h + '시간 ' + m + '분';
  if (h > 0) return h + '시간 ' + m + '분 ' + sec + '초';
  return m + '분 ' + sec + '초';
}

      <div class="card-top">
        <div class="date-block">
          <div class="day">${g.day}</div>
          <div class="dow">${g.dow}요일</div>
          <div class="time">${g.time}</div>
        </div>
        <div class="match-info">
          <div class="teams">${g.away} vs LG 트윈스</div>
          <div class="venue">잠실야구장</div>
        </div>
        <div class="open-info">
          <div class="open-label">판매 오픈</div>
          <div class="open-date">${md} 11:00</div>
        </div>
      </div>
      <div class="countdown-bar">
        <div>
          <div class="countdown-label">오픈까지</div>
          <div class="countdown-time" id="cd${i}">계산 중...</div>
        </div>
        <button class="alarm-btn" id="ab${i}" onclick="toggleAlarm(${i})">알림 설정</button>
      </div>
    `;
    list.appendChild(card);
  });
}

function updateCountdowns() {
  const now = Date.now();
  games.forEach((g, i) => {
    const openTs = new Date(g.openDate).getTime();
    const ms = openTs - now;
    const el = document.getElementById('cd' + i);
    if (!el) return;
    const txt = fmtCountdown(ms);
    el.textContent = txt;
    el.className = 'countdown-time' + (ms <= 0 ? ' open' : ms <= 600000 ? ' soon' : '');
    if (alarmSet[i] && ms > 0 && ms <= 600000 && !alarmTimers['fired' + i]) {
      alarmTimers['fired' + i] = true;
      fireAlarm(g, i);
    }
  });
}

function toggleAlarm(i) {
  alarmSet[i] = !alarmSet[i];
  const btn = document.getElementById('ab' + i);
  if (alarmSet[i]) {
    btn.textContent = '알림 설정됨';
    btn.classList.add('set');
    scheduleAlarm(i);
  } else {
    btn.textContent = '알림 설정';
    btn.classList.remove('set');
    if (alarmTimers[i]) { clearTimeout(alarmTimers[i]); delete alarmTimers[i]; }
  }
}

function scheduleAlarm(i) {
  const g = games[i];
  const alertTs = new Date(g.openDate).getTime() - 10 * 60 * 1000;
  const delay = alertTs - Date.now();
  if (delay > 0) alarmTimers[i] = setTimeout(() => fireAlarm(g, i), delay);
  else if (delay > -600000) fireAlarm(g, i);
}

function fireAlarm(g, i) {
  const msg = 'LG 트윈스 vs ' + g.away + ' (' + g.date + ') 티켓이 10분 후 오픈됩니다!';
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('TWINS 티켓 오픈 10분 전!', { body: msg });
  }
  const token = localStorage.getItem('tgToken') || '';
  const chatId = localStorage.getItem('tgChatId') || '';
  if (token && chatId) sendTG(token, chatId, msg, null, null);
}

function requestNotif() {
  Notification.requestPermission().then(updateNotifStatus);
}

function updateNotifStatus() {
  const el = document.getElementById('notifStatus');
  const btn = document.getElementById('notifBtn');
  if (!('Notification' in window)) {
    el.textContent = '이 브라우저는 알림을 지원하지 않아요.';
    el.className = 'notif-status err';
  } else if (Notification.permission === 'granted') {
    el.textContent = '알림이 허용되어 있어요. 각 경기 카드에서 알림 설정을 눌러주세요.';
    el.className = 'notif-status ok';
    btn.style.display = 'none';
  } else if (Notification.permission === 'denied') {
    el.textContent = '알림이 차단되어 있어요. 브라우저 설정에서 허용해주세요.';
    el.className = 'notif-status err';
    btn.style.display = 'none';
  } else {
    el.textContent = '알림 권한을 허용하면 오픈 10분 전에 팝업이 나타납니다.';
    el.className = 'notif-status';
    btn.style.display = '';
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((b, i) => {
    b.classList.toggle('active', ['browser','telegram'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function cleanVal(v) { return v.replace(/\s/g, ''); }

function handlePaste(e, inputId, hintId, type) {
  e.preventDefault();
  const raw = (e.clipboardData || window.clipboardData).getData('text');
  const cleaned = cleanVal(raw);
  document.getElementById(inputId).value = cleaned;
  showHint(hintId, cleaned, type);
}

function cleanAndValidate(inputId, hintId, type) {
  const el = document.getElementById(inputId);
  const cleaned = cleanVal(el.value);
  if (cleaned !== el.value) el.value = cleaned;
  showHint(hintId, cleaned, type);
}

function showHint(hintId, v, type) {
  const el = document.getElementById(hintId);
  if (!v) { el.textContent = ''; el.className = 'field-hint'; return; }
  if (type === 'token') {
    const ok = /^\d+:[A-Za-z0-9_-]+$/.test(v);
    el.textContent = ok ? '형식 확인' : '올바른 형식: 숫자:영문숫자';
    el.className = 'field-hint ' + (ok ? 'ok' : 'err');
  } else {
    const ok = /^-?\d+$/.test(v);
    el.textContent = ok ? '형식 확인' : '숫자만 입력해주세요';
    el.className = 'field-hint ' + (ok ? 'ok' : 'err');
  }
}

function getInputVals() {
  return {
    token: cleanVal(document.getElementById('tgToken').value),
    chatId: cleanVal(document.getElementById('tgChatId').value)
  };
}

function showTgStatus(msg, ok) {
  const el = document.getElementById('tgStatus');
  el.textContent = msg;
  el.className = 'status-msg ' + (ok ? 'ok' : 'err');
}

function sendTG(token, chatId, text, onOk, onErr) {
  fetch('https://api.telegram.org/bot' + token + '/sendMessage', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({chat_id: chatId, text: text})
  })
  .then(r => r.json())
  .then(d => { if (d.ok && onOk) onOk(); else if (!d.ok && onErr) onErr(); })
  .catch(() => { if (onErr) onErr(); });
}

function saveTelegram() {
  const {token, chatId} = getInputVals();
  if (!token || !chatId) { showTgStatus('토큰과 Chat ID를 모두 입력해주세요.', false); return; }
  localStorage.setItem('tgToken', token);
  localStorage.setItem('tgChatId', chatId);
  showTgStatus('저장 완료! 테스트 전송으로 확인해보세요.', true);
}

function testTelegram() {
  const {token, chatId} = getInputVals();
  if (!token || !chatId) { showTgStatus('토큰과 Chat ID를 입력 후 테스트해주세요.', false); return; }
  showTgStatus('전송 중...', true);
  sendTG(token, chatId,
    'LG 트윈스 티켓 알리미 연결 완료! 티켓 오픈 10분 전에 알려드릴게요. TWINS 파이팅!',
    () => showTgStatus('전송 성공! 텔레그램을 확인해보세요.', true),
    () => showTgStatus('전송 실패. 토큰 또는 Chat ID를 다시 확인해주세요.', false)
  );
}

const savedToken = localStorage.getItem('tgToken') || '';
const savedChatId = localStorage.getItem('tgChatId') || '';
if (savedToken) { document.getElementById('tgToken').value = savedToken; showHint('tokenHint', savedToken, 'token'); }
if (savedChatId) { document.getElementById('tgChatId').value = savedChatId; showHint('chatHint', savedChatId, 'chatid'); }

renderGames();
updateNotifStatus();
setInterval(updateCountdowns, 1000);
updateCountdowns();
</script>
</body>
</html>
